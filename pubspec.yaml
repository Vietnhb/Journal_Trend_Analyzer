name: journal_trend_analyzer
description: "A Flutter app for searching OpenAlex publications and analyzing journal trends."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  fl_chart: ^1.2.0
  http: ^1.6.0
  provider: ^6.1.5+1
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.5
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  google_sign_in: ^7.2.0
  firebase_messaging: ^16.4.1
  firebase_analytics: ^12.4.3
  firebase_crashlytics: ^5.2.4
  firebase_remote_config: ^6.5.3
  firebase_storage: ^13.4.3
  pdf: ^3.12.0
  path_provider: ^2.1.6
  printing: ^5.14.3
  flutter_local_notifications: ^22.0.1

dependency_overrides:
  shared_preferences_android: 2.4.22

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  patrol: ^4.6.1

flutter:
  uses-material-design: true

patrol:
  app_name: Journal Trend Analyzer
  test_directory: patrol_tests
  android:
    package_name: com.prm393.journal_trend_analyzer
